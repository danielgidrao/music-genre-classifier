services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: music-genre-api
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: music-genre-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_PROXY_TARGET=http://api:8000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api
    restart: unless-stopped

volumes:
  frontend_node_modules:
